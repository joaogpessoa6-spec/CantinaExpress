<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cantina Express — Painel Admin</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: auto; height: auto; }
    #app { height: auto; overflow: auto; }
  </style>
</head>
<body>
<div class="admin-body">

  <div class="admin-header">
    <div>
      <h1 class="admin-title">🍔 Cantina <span>Express</span></h1>
      <p style="color:var(--text-muted);font-size:13px;margin-top:2px">Painel de Gerenciamento de Pedidos</p>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <span id="admin-clock" style="color:var(--text-muted);font-size:16px;font-weight:600"></span>
      <button class="refresh-btn" onclick="carregarPedidos()">🔄 Atualizar</button>
      <a href="/" style="background:var(--card);color:var(--text);border:1px solid var(--border);padding:10px 18px;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none">← Totem</a>
    </div>
  </div>

  <div class="admin-content">
    <!-- Resumo -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px" id="stats-row">
      <div class="stat-card" style="background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border)">
        <div style="font-size:32px;margin-bottom:8px">📋</div>
        <div style="font-size:28px;font-weight:900" id="stat-total">0</div>
        <div style="font-size:13px;color:var(--text-muted)">Total de Pedidos</div>
      </div>
      <div class="stat-card" style="background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(247,147,30,0.3)">
        <div style="font-size:32px;margin-bottom:8px">⏳</div>
        <div style="font-size:28px;font-weight:900;color:var(--secondary)" id="stat-aguardando">0</div>
        <div style="font-size:13px;color:var(--text-muted)">Aguardando</div>
      </div>
      <div class="stat-card" style="background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(108,99,255,0.3)">
        <div style="font-size:32px;margin-bottom:8px">👨‍🍳</div>
        <div style="font-size:28px;font-weight:900;color:#6C63FF" id="stat-preparando">0</div>
        <div style="font-size:13px;color:var(--text-muted)">Preparando</div>
      </div>
      <div class="stat-card" style="background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid rgba(16,185,129,0.3)">
        <div style="font-size:32px;margin-bottom:8px">💰</div>
        <div style="font-size:28px;font-weight:900;color:var(--success)" id="stat-faturamento">R$ 0</div>
        <div style="font-size:13px;color:var(--text-muted)">Faturamento</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="status-tabs">
      <button class="status-tab active" onclick="filtrarStatus(this,'todos')">🍽️ Todos</button>
      <button class="status-tab" onclick="filtrarStatus(this,'aguardando_pagamento')">⏳ Aguardando Pagamento</button>
      <button class="status-tab" onclick="filtrarStatus(this,'pago')">✅ Pago</button>
      <button class="status-tab" onclick="filtrarStatus(this,'preparando')">👨‍🍳 Preparando</button>
      <button class="status-tab" onclick="filtrarStatus(this,'pronto')">🔔 Pronto</button>
      <button class="status-tab" onclick="filtrarStatus(this,'entregue')">📦 Entregue</button>
    </div>

    <!-- Grid de pedidos -->
    <div class="orders-grid" id="orders-grid">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted)">
        Carregando pedidos...
      </div>
    </div>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
